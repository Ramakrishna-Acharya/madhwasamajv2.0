<script>
    // Hamburger logic — defined globally so pages can call it
    window.initHamburger = function() {
        const hamburger = document.getElementById('hamburgerBtn');
        const navLinks = document.getElementById('navLinks');
        if (!hamburger || !navLinks) return;

        // Remove old listeners to avoid duplicates
        const newHamburger = hamburger.cloneNode(true);
        hamburger.parentNode.replaceChild(newHamburger, hamburger);
        const newNavLinks = navLinks.cloneNode(true);
        navLinks.parentNode.replaceChild(newNavLinks, navLinks);

        const finalHamburger = document.getElementById('hamburgerBtn');
        const finalNavLinks = document.getElementById('navLinks');

        finalHamburger.addEventListener('click', function(e) {
            e.stopPropagation();
            finalNavLinks.classList.toggle('active');
            const spans = finalHamburger.querySelectorAll('span');
            if (finalNavLinks.classList.contains('active')) {
                spans[0].style.transform = 'rotate(45deg) translate(5px, 5px)';
                spans[1].style.opacity = '0';
                spans[2].style.transform = 'rotate(-45deg) translate(5px, -5px)';
            } else {
                spans[0].style.transform = 'none';
                spans[1].style.opacity = '1';
                spans[2].style.transform = 'none';
            }
        });

        finalNavLinks.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                finalNavLinks.classList.remove('active');
                const spans = finalHamburger.querySelectorAll('span');
                spans[0].style.transform = 'none';
                spans[1].style.opacity = '1';
                spans[2].style.transform = 'none';
            });
        });

        document.addEventListener('click', function(e) {
            if (!finalNavLinks.contains(e.target) && !finalHamburger.contains(e.target)) {
                finalNavLinks.classList.remove('active');
                const spans = finalHamburger.querySelectorAll('span');
                spans[0].style.transform = 'none';
                spans[1].style.opacity = '1';
                spans[2].style.transform = 'none';
            }
        });
    };

    window.highlightCurrentPage = function() {
        const currentPage = window.location.pathname.split('/').pop() || 'index.html';
        document.querySelectorAll('.nav-links a').forEach(link => {
            const href = link.getAttribute('href');
            if (href === currentPage || (currentPage === 'index.html' && href === 'index.html')) {
                link.classList.add('active');
            } else {
                link.classList.remove('active');
            }
        });
    };
</script>
